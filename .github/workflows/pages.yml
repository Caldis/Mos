name: Deploy Pages

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/pages.yml"
      - "release/**"
      - "website/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: website/.nvmrc
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install website dependencies
        run: npm ci
        working-directory: website

      - name: Build website artifact
        run: npm run build
        working-directory: website
        env:
          # Wall backend — public values injected at static-export build time.
          # Leaving the Turnstile key unset keeps the widget inert (and the
          # wall on its local-seed fallback). Set the WALL_TURNSTILE_SITE_KEY
          # repo variable to enable it.
          NEXT_PUBLIC_SERVER_URL: https://mos-api.caldis.me
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.WALL_TURNSTILE_SITE_KEY }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/out
          include-hidden-files: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
